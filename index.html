<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Yapılacaklar</h1>
      <p class="date" id="currentDate"></p>
    </header>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="100">
      <button id="addBtn">Ekle</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tümü</button>
      <button class="filter-btn" data-filter="active">Aktif</button>
      <button class="filter-btn" data-filter="completed">Tamamlanan</button>
    </div>

    <ul id="todoList"></ul>

    <footer class="footer" id="footer">
      <span id="remainingCount"></span>
      <button id="clearCompleted">Tamamlananları Sil</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
